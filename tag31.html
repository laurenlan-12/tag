<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>MR.LIVING 居家先生 A4橫向四欄雙產品吊牌產生器 (顏色置中與動態流動版)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #000000;
            /* A4 橫向 297mm x 210mm，水平平分四個直條 (297 / 4 = 74.25mm) */
            --tag-width: 74.25mm;
            --tag-height: 210mm;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
            margin: 0; padding: 0; display: flex;
        }

        /* 左側控制面板 */
        #control-panel {
            width: 390px; height: 100vh; background: #fff; padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto;
            position: fixed; left: 0; top: 0; z-index: 100;
        }

        h2 { font-size: 20px; margin-top: 0; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        label { display: block; font-weight: 700; font-size: 14px; margin-bottom: 8px; color: #4b5563; }
        input[type="text"], textarea {
            width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
        }
        .toggle-group { display: flex; align-items: center; gap: 10px; margin-top: 8px; font-size: 13px; }
        
        /* 模式展示狀態標示 */
        .mode-display {
            padding: 12px; background: #2c2c2c; color: #fff; text-align: center;
            font-weight: 700; font-size: 14px; border-radius: 6px; margin-bottom: 20px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }

        /* 商品資料區塊卡片 */
        .product-card { background: #f9fafb; border: 1px solid #e5e7eb; padding: 15px; border-radius: 6px; margin-bottom: 15px; }
        .product-card-title { font-weight: bold; font-size: 15px; margin-bottom: 12px; padding-bottom: 5px; border-bottom: 2px solid #e5e7eb; display: flex; align-items: center; gap: 5px;}
        .p1-title { color: #1f2937; }
        .p2-title { color: #0066cc; }

        /* 動態編輯項目 */
        .dynamic-edit-item { display: flex; gap: 4px; margin-bottom: 6px; align-items: center; }
        .dynamic-edit-item select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; background: #fff; }
        .dynamic-edit-item input[type="file"] { font-size: 11px; max-width: 130px; }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; }
        .btn-add { background: #4caf50; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; margin-top: 5px; margin-bottom: 10px; }

        /* 輸出按鈕 */
        .action-container { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        button.action-btn {
            width: 100%; padding: 12px; color: white; border: none; border-radius: 6px; 
            font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; 
            font-family: 'Noto Sans TC', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button.print-btn { background: #2c2c2c; }
        button.print-btn:hover { background: #000; }
        button.pdf-btn { background: #0066cc; }
        button.pdf-btn:hover { background: #004499; }

        /* A4 預覽區域 */
        #print-area { margin-left: 390px; padding: 40px; display: flex; justify-content: center; width: calc(100% - 390px); }
        .a4-sheet {
            width: 297mm; height: 210mm; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.1); display: flex; position: relative;
            background-size: 100% 100%; background-repeat: no-repeat; background-position: center;
            -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
        }

        /* 吊牌版型容器 */
        .tag { width: var(--tag-width); height: var(--tag-height); padding: 26mm 8mm 12mm 8mm; display: flex; flex-direction: column; color: var(--primary-color); position: relative; border-right: 1px dashed #e0e0e0; background: transparent; }
        .tag:last-child { border-right: none; }
        
        .tag-header { text-align: left; margin-bottom: 3px; }
        .val-series { font-size: 26pt; font-weight: 700; margin: 0; line-height: 1.1; letter-spacing: 0.5px; }
        .val-item { font-size: 18pt; font-weight: 700; margin: 4px 0 3px 0; }
        .val-color-spec { font-size: 11pt; color: #333; margin: 0; font-weight: 400; }
        .val-size-spec { font-size: 10pt; color: #555; margin: 3px 0 2px 0; font-weight: 400; }

        /* 中間動態區塊：利用 Flexbox 的 order 屬性來動態決定上下順序 */
        .media-flow-container { display: flex; flex-direction: column; width: 100%; margin: 4px 0; }

        /* 商品圖片容器 */
        .product-image-container { width: 100%; height: 34mm; order: 1; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
        .product-image-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* 顏色選擇展示區塊 (置中) */
        .colors-preview-container { order: 2; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 12px; padding: 4px 0; min-height: 12mm; width: 100%; }
        .color-preview-item { display: flex; flex-direction: column; align-items: center; width: 45px; text-align: center; }
        .color-circle { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #ccc; background-size: cover; background-position: center; background-color: #eee; margin-bottom: 2px; }
        .color-name { font-size: 7.5pt; color: #333; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; font-weight: 500; }

        /* 產品特性與細節規格 */
        .section-title { font-size: 12pt; font-weight: 700; margin: 4px 0 6px 0; display: block; letter-spacing: 1px; }
        .features-block { margin-bottom: 10px; min-height: 32mm; }
        .features-list { display: flex; flex-direction: column; gap: 8px; }
        .feature-item { display: flex; align-items: flex-start; gap: 8px; }
        .feature-icon { font-size: 13pt; color: #333; width: 22px; text-align: center; padding-top: 1px; }
        .feature-text { font-size: 9.5pt; line-height: 1.3; color: #000; font-weight: 400; }

        .specs-block { margin-bottom: 10px; }
        .val-spec-content { font-size: 9.5pt; line-height: 1.6; color: #000; white-space: pre-wrap; font-weight: 400; }
        
        /* 隱藏元素專用（不影響版面流動） */
        .collapsed { display: none !important; }
        .invisible { visibility: hidden !important; }

        @media print {
            @page { size: A4 landscape; margin: 0; }
            body { background: white; margin: 0; padding: 0; }
            #control-panel { display: none !important; }
            #print-area { margin: 0 !important; padding: 0 !important; width: 297mm !important; height: 210mm !important; }
            .a4-sheet { box-shadow: none !important; width: 297mm !important; height: 210mm !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .tag { border-right: 1px dashed #ddd; }
        }
    </style>
</head>
<body>

    <!-- 控制面板 -->
    <div id="control-panel">
        <h2>MR.LIVING 產品吊牌製作器</h2>
        
        <label><i class="fa-solid fa-layer-group"></i> 當前列印模式：</label>
        <div class="mode-display">
            兩款產品<br><span style="font-size:12px;font-weight:400;opacity:0.9;">(各佔兩欄)</span>
        </div>

        <!-- ================= 產品 A 資料卡 ================= -->
        <div id="card-p1" class="product-card">
            <div class="product-card-title p1-title"><i class="fa-solid fa-font"></i> 產品 A 資訊 (左側兩欄)</div>
            
            <label style="font-size:13px; margin-bottom:4px;">系列名稱</label>
            <input type="text" id="p1-series" value="Antony" oninput="sync()">
            
            <label style="font-size:13px; margin-top:8px; margin-bottom:4px;">品項名稱</label>
            <input type="text" id="p1-item" value="皮餐椅" oninput="sync()">
            
            <label style="font-size:13px; margin-top:8px; margin-bottom:4px;">顏色規格說明</label>
            <input type="text" id="p1-colorspec" value="黑靠背" oninput="sync()">

            <label style="font-size:13px; margin-top:8px; margin-bottom:4px;">尺寸規格</label>
            <input type="text" id="p1-sizespec" value="寬 48.5 x 深 54 x 高 79.5 cm" oninput="sync()">

            <!-- 顏色材質區塊 -->
            <label style="font-size:13px; margin-top:8px; margin-bottom:4px; color: #854d0e;"><i class="fa-solid fa-circle-dot"></i> 顏色與材質圖片配置</label>
            <div id="p1-colors-container"></div>
            <button class="btn-add" onclick="addColorRow(1)"><i class="fa-solid fa-plus"></i> 新增顏色</button>

            <div class="toggle-group" style="margin-top:8px;">
                <input type="checkbox" id="p1-toggle-img" checked onchange="sync()"> 顯示商品照片
            </div>
            <div class="toggle-group">
                <input type="checkbox" id="p1-toggle-features" checked onchange="sync()"> 顯示產品特性區塊
            </div>

            <label style="font-size:13px; margin-top:12px; margin-bottom:4px;">商品照片 (手動上傳)</label>
            <input type="file" accept="image/*" onchange="loadImg(this, 1)">

            <label style="font-size:13px; margin-top:12px; margin-bottom:4px;">產品特性自訂</label>
            <div id="p1-feature-container"></div>
            <button class="btn-add" onclick="addFeatureRow(1)"><i class="fa-solid fa-plus"></i> 新增特性</button>

            <label style="font-size:13px; margin-top:12px; margin-bottom:4px;">規格材質細節 (自由換行)</label>
            <textarea id="p1-spec-text" rows="4" oninput="sync()">椅背 ｜ 曲木板 + 黃麻貼皮
椅座 ｜ 曲木板 + 牛皮坐墊
椅腳 ｜ 鐵烤漆</textarea>
        </div>

        <!-- ================= 產品 B 資料卡 ================= -->
        <div id="card-p2" class="product-card">
            <div class="product-card-title p2-title"><i class="fa-solid fa-bold"></i> 產品 B 資訊 (右側兩欄)</div>
            
            <label style="font-size:13px; margin-bottom:4px;">系列名稱</label>
            <input type="text" id="p2-series" value="Bella" oninput="sync()">
            
            <label style="font-size:13px; margin-top:8px; margin-bottom:4px;">品項名稱</label>
            <input type="text" id="p2-item" value="三人座布沙發" oninput="sync()">
            
            <label style="font-size:13px; margin-top:8px; margin-bottom:4px;">顏色規格說明</label>
            <input type="text" id="p2-colorspec" value="亞麻灰" oninput="sync()">

            <label style="font-size:13px; margin-top:8px; margin-bottom:4px;">尺寸規格</label>
            <input type="text" id="p2-sizespec" value="寬 210 x 深 90 x 高 85 cm" oninput="sync()">

            <!-- 顏色材質區塊 -->
            <label style="font-size:13px; margin-top:8px; margin-bottom:4px; color: #854d0e;"><i class="fa-solid fa-circle-dot"></i> 顏色與材質圖片配置</label>
            <div id="p2-colors-container"></div>
            <button class="btn-add" onclick="addColorRow(2)"><i class="fa-solid fa-plus"></i> 新增顏色</button>

            <div class="toggle-group" style="margin-top:8px;">
                <input type="checkbox" id="p2-toggle-img" checked onchange="sync()"> 顯示商品照片
            </div>
            <div class="toggle-group">
                <input type="checkbox" id="p2-toggle-features" checked onchange="sync()"> 顯示產品特性區塊
            </div>

            <label style="font-size:13px; margin-top:12px; margin-bottom:4px;">商品照片 (手動上傳)</label>
            <input type="file" accept="image/*" onchange="loadImg(this, 2)">

            <label style="font-size:13px; margin-top:12px; margin-bottom:4px;">產品特性自訂</label>
            <div id="p2-feature-container"></div>
            <button class="btn-add" onclick="addFeatureRow(2)"><i class="fa-solid fa-plus"></i> 新增特性</button>

            <label style="font-size:13px; margin-top:12px; margin-bottom:4px;">規格材質細節 (自由換行)</label>
            <textarea id="p2-spec-text" rows="4" oninput="sync()">框架 ｜ 高強度實木骨架
座墊 ｜ 高密度海綿 + 獨立筒
高腳 ｜ 橡木實木腳</textarea>
        </div>

        <!-- 輸出功能 -->
        <div class="action-container">
            <button class="action-btn pdf-btn" onclick="window.print()"><i class="fa-solid fa-file-pdf"></i> 匯出為橫向 PDF</button>
            <button class="action-btn print-btn" onclick="window.print()"><i class="fa-solid fa-print"></i> 直接列印</button>
        </div>
    </div>

    <!-- 右側 A4 橫向預覽區 -->
    <div id="print-area">
        <div class="a4-sheet" id="a4-bg">
            <div class="tag" id="tag-1"></div>
            <div class="tag" id="tag-2"></div>
            <div class="tag" id="tag-3"></div>
            <div class="tag" id="tag-4"></div>
        </div>
    </div>

        // 商品照片暫存
        let imgBase64_P1 = ""; 
        let imgBase64_P2 = ""; 

        // 顏色材質圖片儲存陣列
        let colorImages = {};

        const iconOptions = [
            { value: 'fa-solid fa-couch', text: '🛋️ 沙發/椅' },
            { value: 'fa-solid fa-chair', text: '🪑 椅子/座' },
            { value: 'fa-solid fa-shield-halved', text: '🛡️ 穩固/防護' },
            { value: 'fa-solid fa-wand-magic-sparkles', text: '✨ 特效/防汙' },
            { value: 'fa-solid fa-tree', text: '🌳 實木/環保' },
            { value: 'fa-solid fa-feather', text: '🪶 羽絨/輕盈' },
            { value: 'fa-solid fa-gem', text: '💎 高檔/精緻' }
        ];

        const defaultFeatures = [
            [
                { icon: 'fa-solid fa-couch', text: '人體工學貼合椅背，坐感舒適' },
                { icon: 'fa-solid fa-chair', text: '嚴選頭層牛皮，觸感細膩耐磨' },
                { icon: 'fa-solid fa-shield-halved', text: '穩固鐵烤漆椅腳，承重力強' }
            ],
            [
                { icon: 'fa-solid fa-couch', text: '高密度海綿座墊，完美支撐不塌陷' },
                { icon: 'fa-solid fa-wand-magic-sparkles', text: '天然防蟎防潑水布料，輕鬆防汙' },
                { icon: 'fa-solid fa-tree', text: '北美頂級橡木實木腳，質地堅硬' }
            ]
        ];

        const defaultColors = [
            ['深灰色', '淺灰色'],
            ['亞麻灰', '米白色', '琥珀棕']
        ];

        // 結構核心：把照片與顏色區塊放入同一個 .media-flow-container 中利用 Flexbox 調配順序
        const tagTemplate = `
            <div class="tag-header">
                <div class="val-series"></div>
                <div class="val-item"></div>
                <div class="val-color-spec"></div>
                <div class="val-size-spec"></div>
            </div>
            <div class="media-flow-container">
                <div class="product-image-container val-img-box">
                    <img src="" class="val-img" style="display:none;">
                </div>
                <div class="colors-preview-container"></div>
            </div>
            <div class="section-title">產品特性</div>
            <div class="features-block">
                <div class="features-list"></div>
            </div>
            <div class="specs-block">
                <div class="val-spec-content"></div>
            </div>
        `;

        function initAllInputs() {
            [1, 2].forEach(pid => {
                const fContainer = document.getElementById(`p${pid}-feature-container`);
                fContainer.innerHTML = '';
                defaultFeatures[pid - 1].forEach(f => createFeatureRow(pid, f.icon, f.text));

                const cContainer = document.getElementById(`p${pid}-colors-container`);
                cContainer.innerHTML = '';
                defaultColors[pid - 1].forEach((cName, idx) => createColorRow(pid, cName, idx));
            });
        }

        function createFeatureRow(pid, selectedIcon, textVal) {
            const container = document.getElementById(`p${pid}-feature-container`);
            const div = document.createElement('div');
            div.className = 'dynamic-edit-item';
            let selectHtml = `<select class="sel-icon" onchange="sync()">`;
            iconOptions.forEach(opt => {
                const sel = opt.value === selectedIcon ? 'selected' : '';
                selectHtml += `<option value="${opt.value}" ${sel}>${opt.text}</option>`;
            });
            selectHtml += `</select>`;
            div.innerHTML = `
                ${selectHtml}
                <input type="text" class="in-feature-text" value="${textVal}" oninput="sync()">
                <button class="btn-del" onclick="this.parentElement.remove(); sync();"><i class="fa-solid fa-trash"></i></button>
            `;
            container.appendChild(div);
        }
        function addFeatureRow(pid) { createFeatureRow(pid, 'fa-solid fa-couch', ''); sync(); }

        function createColorRow(pid, colorName, fixedIndex) {
            const container = document.getElementById(`p${pid}-colors-container`);
            const div = document.createElement('div');
            div.className = 'dynamic-edit-item color-row';
            const timestamp = fixedIndex !== undefined ? fixedIndex : Date.now() + Math.random();
            div.dataset.key = `${pid}_${timestamp}`;

            div.innerHTML = `
                <input type="text" class="in-color-name" value="${colorName}" style="width:100px;" oninput="sync()" placeholder="顏色名稱">
                <input type="file" accept="image/*" onchange="loadColorImg(this, '${div.dataset.key}')">
                <button class="btn-del" onclick="this.parentElement.remove(); sync();"><i class="fa-solid fa-trash"></i></button>
            `;
            container.appendChild(div);
        }
        function addColorRow(pid) { createColorRow(pid, '', undefined); sync(); }

        function loadColorImg(input, key) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    colorImages[key] = e.target.result;
                    sync();
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function getFeaturesHtml(pid) {
            const rowElements = document.querySelectorAll(`#p${pid}-feature-container .dynamic-edit-item`);
            let html = '';
            rowElements.forEach(row => {
                const icon = row.querySelector('.sel-icon').value;
                const text = row.querySelector('.in-feature-text').value;
                if(text.trim() !== "") {
                    html += `<div class="feature-item"><div class="feature-icon"><i class="${icon}"></i></div><div class="feature-text">${text}</div></div>`;
                }
            });
            return html;
        }

        function getColorsHtml(pid) {
            const rows = document.querySelectorAll(`#p${pid}-colors-container .color-row`);
            let html = '';
            rows.forEach(row => {
                const key = row.dataset.key;
                const name = row.querySelector('.in-color-name').value;
                const imgStyle = colorImages[key] ? `background-image: url('${colorImages[key]}')` : '';
                if(name.trim() !== "") {
                    html += `
                        <div class="color-preview-item">
                            <div class="color-circle" style="${imgStyle}"></div>
                            <div class="color-name">${name}</div>
                        </div>
                    `;
                }
            });
            return html;
        }

        function fillTagData(tag, pid) {
            tag.querySelector('.val-series').innerText = document.getElementById(`p${pid}-series`).value;
            tag.querySelector('.val-item').innerText = document.getElementById(`p${pid}-item`).value;
            tag.querySelector('.val-color-spec').innerText = document.getElementById(`p${pid}-colorspec`).value;
            tag.querySelector('.val-size-spec').innerText = document.getElementById(`p${pid}-sizespec`).value;
            
            // 填入材質顏色數據 (CSS 內部已設定完美置中)
            tag.querySelector('.colors-preview-container').innerHTML = getColorsHtml(pid);

            // 控制商品圖片與動態流動
            const imgBox = tag.querySelector('.product-image-container');
            const imgEl = tag.querySelector('.val-img');
            const currentBase64 = (pid === 1) ? imgBase64_P1 : imgBase64_P2;

            if (document.getElementById(`p${pid}-toggle-img`).checked && currentBase64 && currentBase64.trim() !== "") {
                // 有啟用顯示且確實有上傳圖片：顯示圖片區塊結構
                imgBox.classList.remove('collapsed');
                imgEl.src = currentBase64;
                imgEl.style.display = 'block';
            } else {
                // 未勾選或沒有上傳圖片：徹底隱藏區塊結構，讓下方的顏色區塊完美向上推擠至尺寸規格正下方
                imgBox.classList.add('collapsed');
                imgEl.style.display = 'none';
            }

            // 特性區塊
            const featuresBlock = tag.querySelector('.features-block');
            const sectionTitle = tag.querySelector('.section-title');
            if (document.getElementById(`p${pid}-toggle-features`).checked) {
                featuresBlock.classList.remove('invisible');
                sectionTitle.classList.remove('invisible');
                tag.querySelector('.features-list').innerHTML = getFeaturesHtml(pid);
            } else {
                featuresBlock.classList.add('invisible');
                sectionTitle.classList.add('invisible');
            }

            // 材質細節
            tag.querySelector('.val-spec-content').innerText = document.getElementById(`p${pid}-spec-text`).value;
        }

        function sync() {
            const a4Bg = document.getElementById('a4-bg');
            if (permanentBackground && permanentBackground.length > 50) {
                a4Bg.style.backgroundImage = `url('${permanentBackground}')`;
            }

            const t1 = document.getElementById('tag-1');
            const t2 = document.getElementById('tag-2');
            const t3 = document.getElementById('tag-3');
            const t4 = document.getElementById('tag-4');
            
            if (!t1.innerHTML.trim()) t1.innerHTML = tagTemplate;
            if (!t2.innerHTML.trim()) t2.innerHTML = tagTemplate;
            if (!t3.innerHTML.trim()) t3.innerHTML = tagTemplate;
            if (!t4.innerHTML.trim()) t4.innerHTML = tagTemplate;

            fillTagData(t1, 1);
            fillTagData(t2, 1);
            fillTagData(t3, 2);
            fillTagData(t4, 2);
        }

        function loadImg(input, pid) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    if (pid === 1) imgBase64_P1 = e.target.result;
                    else imgBase64_P2 = e.target.result;
                    sync();
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        initAllInputs();
        sync();
    </script>
</body>
